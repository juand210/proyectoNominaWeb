{% extends "home.html" %}

{% block content %}

<div class="row mb-4">
    <div class="col-12">
        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-header bg-primary text-white py-2 rounded-top-4">
                <div class="d-flex align-items-center justify-content-center gap-2">
                    <i class="bi bi-file-earmark-text fs-5"></i>
                    <h5 class="card-title mb-0 fs-6 fw-semibold">Seleccionar Tipo de Certificado</h5>
                </div>
            </div>

            <form method="POST" action="/certificados" id="formCertificados">
                <div class="card-body p-4">
                    <!-- Tipo de certificado -->
                    <div class="row justify-content-center gy-2 mb-4">
                        <!-- Opción 1: Laboral -->
                        <div class="col-md-3 col-sm-5">
                            <label class="d-block border rounded-3 p-2 bg-white text-center shadow-sm h-100"
                                   style="cursor: pointer;" for="laboral">
                                <input class="form-check-input mb-1"
                                       type="radio"
                                       name="tipo_certificado"
                                       id="laboral"
                                       value="laboral" required
                                       {% if tipo_certificado== 'laboral' %}checked{% endif %}>
                                <div>
                                    <i class="bi bi-briefcase fs-4 text-primary mb-1 d-block"></i>
                                    <span class="d-block fw-semibold text-dark mb-1" style="font-size: 0.95rem;">Laboral</span>
                                    <small class="text-muted" style="font-size: 0.78rem; line-height: 1.2;">
                                        Consulta certificados laborales de empleados.
                                    </small>
                                </div>
                            </label>
                        </div>

                        <!-- Opción 2: Ingresos -->
                        <div class="col-md-3 col-sm-5">
                            <label class="d-block border rounded-3 p-2 bg-white text-center shadow-sm h-100"
                                   style="cursor: pointer;" for="ingresos">
                                <input class="form-check-input mb-1"
                                       type="radio"
                                       name="tipo_certificado"
                                       id="ingresos"
                                       value="ingresos" required
                                       {% if tipo_certificado== 'ingresos' %}checked{% endif %}>
                                <div>
                                    <i class="bi bi-cash-coin fs-4 text-success mb-1 d-block"></i>
                                    <span class="d-block fw-semibold text-dark mb-1" style="font-size: 0.95rem;">Ingresos</span>
                                    <small class="text-muted" style="font-size: 0.78rem; line-height: 1.2;">
                                        Consulta certificados de ingresos y retenciones.
                                    </small>
                                </div>
                            </label>
                        </div>
                    </div>

                    <!-- Filtros Laboral -->
                    <div id="filtrosLaboral" class="mb-4 {% if tipo_certificado != 'laboral' %}d-none{% endif %}">
                        <div class="text-center mb-3">
                            <h6 class="text-muted small fw-semibold mb-2">Filtros Laboral</h6>
                            <small class="text-muted">
                                Selecciona el estado del certificado a consultar.
                            </small>
                        </div>

                        <div class="row justify-content-center gy-2">
                            <!-- Todos -->
                            <div class="col-md-3 col-sm-5">
                                <label class="d-block border rounded-3 p-2 bg-white text-center shadow-sm h-100"
                                       style="cursor: pointer;" for="todos">
                                    <input class="form-check-input mb-1"
                                           type="radio" name="estado" id="todos" value="TODOS"
                                           {% if estado== 'TODOS' %}checked{% endif %}>
                                    <div>
                                        <span class="d-block fw-semibold text-dark mb-1" style="font-size: 0.95rem;">Todos</span>
                                        <small class="text-muted" style="font-size: 0.78rem; line-height: 1.2;">
                                            Lista completa de activos y retirados.
                                        </small>
                                    </div>
                                </label>
                            </div>

                            <!-- Activos -->
                            <div class="col-md-3 col-sm-5">
                                <label class="d-block border rounded-3 p-2 bg-white text-center shadow-sm h-100"
                                       style="cursor: pointer;" for="activo">
                                    <input class="form-check-input mb-1"
                                           type="radio" name="estado" id="activo" value="ACTIVO"
                                           {% if estado== 'ACTIVO' %}checked{% endif %}>
                                    <div>
                                        <span class="d-block fw-semibold text-dark mb-1" style="font-size: 0.95rem;">Activos</span>
                                        <small class="text-muted" style="font-size: 0.78rem; line-height: 1.2;">
                                            Solo empleados aún vinculados a la empresa.
                                        </small>
                                    </div>
                                </label>
                            </div>

                            <!-- Retirados -->
                            <div class="col-md-3 col-sm-5">
                                <label class="d-block border rounded-3 p-2 bg-white text-center shadow-sm h-100"
                                       style="cursor: pointer;" for="retirado">
                                    <input class="form-check-input mb-1"
                                           type="radio" name="estado" id="retirado" value="RETIRADO"
                                           {% if estado== 'RETIRADO' %}checked{% endif %}>
                                    <div>
                                        <span class="d-block fw-semibold text-dark mb-1" style="font-size: 0.95rem;">Retirados</span>
                                        <small class="text-muted" style="font-size: 0.78rem; line-height: 1.2;">
                                            Empleados que han finalizado su relación laboral.
                                        </small>
                                    </div>
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- Filtros Ingresos -->
                    <div id="filtrosIngresos" class="mb-4 {% if tipo_certificado != 'ingresos' %}d-none{% endif %}">
                        <div class="text-center mb-3">
                            <h6 class="text-muted small fw-semibold mb-2">Filtros Ingresos / Retención</h6>
                            <small class="text-muted">
                                Busca el periodo de ingresos que se va a consultar.
                            </small>
                        </div>

                        <div class="row justify-content-center gy-2">
                            <div class="col-md-4 col-sm-8">
                                <label class="form-label d-block text-center small fw-semibold text-muted mb-1">
                                    Periodo
                                </label>
                                <select class="form-select form-select-sm rounded-3" name="periodo_ingresos">
                                    <option value="">Seleccionar periodo...</option>
                                    {% for anio in anios %}
                                    <option value="{{ anio }}"
                                            {% if periodo_ingresos== anio %}selected{% endif %}>
                                        {{ anio }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="border-top mt-4 pt-3">
                        <div class="d-flex justify-content-end">
                            <button type="submit" class="btn btn-primary px-4 py-2 fw-semibold rounded-3 shadow-sm">
                                <i class="bi bi-file-earmark-check me-2"></i>
                                Consultar certificado
                            </button>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<div id="contenedor-tabla">
    {% include "partials/tabla_certificado.html" %}
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const radiosPrincipales = document.querySelectorAll('input[name="tipo_certificado"]');
        const filtrosLaboral = document.getElementById('filtrosLaboral');
        const filtrosIngresos = document.getElementById('filtrosIngresos');

        radiosPrincipales.forEach(radio => {
            radio.addEventListener('change', function () {
                if (this.value === 'laboral') {
                    filtrosLaboral.classList.remove('d-none');
                    filtrosIngresos.classList.add('d-none');
                } else {
                    filtrosLaboral.classList.add('d-none');
                    filtrosIngresos.classList.remove('d-none');
                }
            });
        });
    });

    document.addEventListener("DOMContentLoaded", function () {
    const form = document.getElementById("formCertificados");
    const contenedor = document.getElementById("contenedor-tabla");

    form.addEventListener("submit", async function (e) {
        e.preventDefault();

        const formData = new FormData(form);

        const response = await fetch("/certificados", {
            method: "POST",
            body: formData
        });

        const html = await response.text();
        contenedor.innerHTML = html;
    });
});
</script>

{% endblock %}
