<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>
<body class="d-flex align-items-center py-4 bg-light min-vh-100">
  <main class="form-signin w-100 m-auto" style="max-width: 400px;">
    {% if error %}
    <div class="alert alert-danger alert-dismissible fade show" role="alert">
  {{ error }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
{% endif %}
    <form method="POST" action="/login">
      <h2 class="mb-4 text-center">Inicio de sesión</h2>
      <div class="mb-3">
        <label for="cod_personal" class="form-label">Codigo Personal</label>
        <input
          type="number"
          class="form-control"
          id="cod_personal"
          name="cod_personal"
          value="{{ codigo_personal }}"
          placeholder="Cedula empleado"
          required
        />
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Contraseña</label>
        <input
          type="password"
          class="form-control"
          id="password"
          name="password"
          required
        />
      </div>
      <button class="w-100 btn btn-primary" type="submit">Iniciar sesión</button>
    </form>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
