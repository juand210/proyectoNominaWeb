<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nomina Web</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-light">
    <div class="container-fluid p-0">
        <div class="row g-0">
            <div class="col-auto col-md-2.5 vh-100 bg-gradient bg-primary text-white p-0 position-fixed z-3 sidebar-custom" style="width: 280px;">
                <div class="h-100 d-flex flex-column overflow-hidden">
                    <div class="p-4 border-bottom border-primary border-opacity-25">
                        <div class="text-center mb-3">
                            <img src="/static/logo.png" alt="Logo Nómina" class="rounded-circle shadow-sm mb-3" style="width: 70px; height: 70px;">
                            <h4 class="mb-0 fw-bold lh-sm">Nómina Web</h4>
                            <small class="opacity-75">Sistema de Gestión</small>
                        </div>
                    </div>

                    <!-- Menu principal -->
                    <nav class="flex-grow-1 px-3 py-2">
                        <ul class="nav nav-pills flex-column gap-2">
                            <li class="nav-item">
                                <a class="nav-link text-white px-4 py-3 rounded-3 shadow-sm" href="/nomina">
                                    <i class="bi bi-currency-dollar fs-4 me-3"></i>
                                    <span class="fs-6 fw-semibold">Nómina</span>
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link text-white px-4 py-3 rounded-3 shadow-sm" href="/certificados">
                                    <i class="bi bi-file-earmark-text fs-4 me-3"></i>Certificados
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link text-white px-4 py-3 rounded-3 shadow-sm" href="/vacaciones">
                                    <i class="bi bi-calendar2-range fs-4 me-3"></i>Vacaciones
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link text-white px-4 py-3 rounded-3 shadow-sm" href="/empleados">
                                    <i class="bi bi-people fs-4 me-3"></i>Empleados
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link text-white px-4 py-3 rounded-3 shadow-sm" href="/configuracion">
                                    <i class="bi bi-gear fs-4 me-3"></i>Configuración
                                </a>
                            </li>
                            <hr class="text-white-50 my-3">
                            <li class="nav-item mt-auto">
                                <a class="nav-link text-white-50 px-4 py-3 rounded-3" href="/logout">
                                    <i class="bi bi-box-arrow-right fs-4 me-3"></i>
                                    <span class="fw-medium">Cerrar Sesión</span>
                                </a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>

            <div class="col ms-sm-n3" style="margin-left: 280px;">
                <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm border-bottom sticky-top z-2">
                    <div class="container-fluid px-4 py-2">
                        <div class="row mb-4">
                            <div class="col-12">
                                <h2>Panel principal</h2>
                            </div>
                        </div>

                        <div class="d-flex align-items-center gap-4">
                            <div class="text-end">
                                <div class="fw-semibold text-dark fs-6">{{ nombre|default('Usuario') }}</div>
                                <small class="text-muted">{{ email|default('sin email') }}</small>
                            </div>
                        </div>
                    </div>
                </nav>


                <main class="p-4 p-lg-5 bg-light min-vh-100">
                    <div class="content-area">
                        {% block content %}{% endblock %}
                    </div>
                </main>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Activar link activo
        document.querySelectorAll('.nav-link[href]').forEach(link => {
            if (link.href === window.location.href) {
                link.classList.add('active', 'bg-primary-subtle', 'bg-opacity-75');
            }
        });
    </script>
</body>
</html>
