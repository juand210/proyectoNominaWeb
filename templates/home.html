<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nomina Web</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-light">
<div class="container-fluid p-0">
    <div class="row g-0">
        <div class="col-auto vh-100 bg-primary text-white p-0 position-fixed z-3 sidebar-custom"
             style="width: 280px;">
            <div class="h-100 d-flex flex-column">

                <!-- Encabezado -->
                <div class="p-4 border-bottom border-light border-opacity-25">
                    <div class="d-flex align-items-center gap-3">
                        <img src="/static/logo.png"
                             alt="Logo Nómina"
                             class="rounded-circle shadow-sm flex-shrink-0"
                             style="width: 70px; height: 70px; object-fit: cover;">

                        <div>
                            <h5 class="mb-0 fw-bold lh-sm">Nómina Web</h5>
                            <small class="opacity-75 d-block">Sistema de Gestión</small>
                        </div>
                    </div>
                </div>

                <!-- Menú -->
                <nav class="flex-grow-1 d-flex flex-column px-3 py-3">
                    <ul class="nav nav-pills flex-column gap-2 h-100">
                        <li class="nav-item">
                            <a class="nav-link text-white px-4 py-3 rounded-3 shadow-sm" href="/nomina">
                                <i class="bi bi-receipt fs-4 me-3"></i>
                                <span class="fs-6 fw-semibold">Nómina</span>
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link text-white px-4 py-3 rounded-3 shadow-sm" href="/certificados">
                                <i class="bi bi-file-earmark-text fs-4 me-3"></i>
                                <span>Certificados</span>
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link text-white px-4 py-3 rounded-3 shadow-sm" href="/vacaciones">
                                <i class="bi bi-calendar2-range fs-4 me-3"></i>
                                <span>Vacaciones</span>
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link text-white px-4 py-3 rounded-3 shadow-sm" href="/ausentismo">
                                <i class="bi bi-envelope-paper fs-4 me-3"></i>
                                <span>Ausentismo</span>
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link text-white px-4 py-3 rounded-3 shadow-sm" href="/configuracion">
                                <i class="bi bi-gear fs-4 me-3"></i>
                                <span>Configuración</span>
                            </a>
                        </li>

                        <li class="mt-auto pt-3">
                            <hr class="text-white-50 mb-3">
                            <a class="nav-link text-white-50 px-4 py-3 rounded-3" href="/logout">
                                <i class="bi bi-box-arrow-right fs-4 me-3"></i>
                                <span class="fw-medium">Cerrar sesión</span>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>

        <div class="col" style="margin-left: 280px;">
            <nav class="navbar bg-white shadow-sm border-bottom sticky-top z-2 py-2">
                <div class="container-fluid px-4 d-flex justify-content-between align-items-center">

                    <!-- Lado izquierdo: título -->
                    <div class="d-flex align-items-center gap-3">
                        <div>
                            <h5 class="mb-0 fw-bold text-dark">{{ titulo }}</h5>
                            <small class="text-muted">Panel de gestión</small>
                        </div>
                    </div>

                    <!-- Lado derecho: usuario -->
                    <div class="d-flex align-items-center gap-3">
                        <div class="text-end lh-sm">
                            <div class="fw-semibold text-dark small">{{ nombre|default('Usuario') }}</div>
                            <small class="text-muted">{{ email|default('sin email') }}</small>
                        </div>

                        <div class="bg-light border rounded-circle d-flex align-items-center justify-content-center"
                             style="width: 40px; height: 40px;">
                            <i class="bi bi-person-circle text-primary fs-5"></i>
                        </div>
                    </div>

                </div>
            </nav>

            <main class="p-4 p-lg-4 bg-light min-vh-100">
                <div class="content-area">
                    {% block content %}{% endblock %}
                </div>
            </main>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Activar link activo
    document.querySelectorAll('.nav-link[href]').forEach(link => {
        if (link.href === window.location.href) {
            link.classList.add('active', 'bg-primary-subtle', 'bg-opacity-75');
        }
    });
</script>
</body>
</html>
